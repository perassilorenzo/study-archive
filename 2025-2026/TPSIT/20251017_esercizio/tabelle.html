<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Lezione sulle tabelle HTML</title>
    </head>
    <body>
        <h1>Esempio 1: tabella base</h1>
        <table border="1">
            <tr>
                <td>Cella 1</td>
                <td>Cella 2</td>
                <td>Cella 3</td>
            </tr>
            <tr>
                <td>Cella 4</td>
                <td>Cella 5</td>
                <td>Cella 6</td>
            </tr>
        </table>

        <h2>Tabella con intestazione</h2>
        <table border="20">
            <thead>
                
                <th>Nome</th>
                <th>Cognome</th>
                <th>Età</th>
            </thead>
            <tbody>
                <tr>
                    <td>Mario</td>
                    <td>Rossi</td>
                    <td>18</td>
                </tr>
                <tr>
                    <td>Lucia</td>
                    <td>Ingaramo</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>Stefano</td>
                    <td>Lombi</td>
                    <td>55</td>
                </tr>
            </tbody>
        </table>
        
        <h2>Esempio3</h2>

        <table border="1">
            <tr>
                <th colspan="2">Informazioni personali</th>
            </tr>
            <tr>
                <td>Marco</td>
                <td>Neri</td>
                <td rowspan="2">email@example.com</td>
            </tr>
            <tr>
                <td>Anna</td>
                <td>Galli</td>
            </tr>
        </table>
    </body>
</html>
