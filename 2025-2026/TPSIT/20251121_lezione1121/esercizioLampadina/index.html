<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lampadina</title>
    </head>
    <body>
        <h3>Javascript può modificare dinamicamente gli elementi di una pagina web</h3>
        <h4>In questo esempio modifichiamo l'attributo src di un immagina</h4>
        <button onclick="accendi()">Accendi la luce</button>
        <img src="immagini/bulboff.gif" alt="lampadina spenta" id="myImage">
        <button onclick="spegni()">Spegni la luce</button>
        <script src="js/index.js"></script>
    </body>
</html>
