<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="js/index.js"></script>
        <title>Somma di due numeri positivi presi dalla textbox</title>
    </head>
    <body>
        <h1>Somma di due numeri positivi presi dalla textbox</h1>
        <form action="">
            <div>
                <label>Inserire il primo valore:
                    <input type="number" name="txt1" id="txt1">
                </label>
                <label>Inserire il secondo valore:
                    <input type="number" name="txt2" id="txt2">
                </label>
            </div>
            <br>
            <div class="input">
                <input type="button" value="Esegui la somma" onclick="somma()">
                <input type="button" value="Esegui la sottrazione" onclick="sottrazione()">
                <input type="button" value="Esegui la moltiplicazione" onclick="moltiplicazione()">
                <input type="button" value="Esegui la divisione" onclick="divisione()">
            </div>
        </form>
    </body>
</html>
