<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cortina</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/style.js"></script>
</head>
<body>
    <header>
        <h2>Milano-Cortina 2026</h2>
        <p>Sei pronto per la sfida</p>
        <button id="btnVinciBiglietto" onclick="mostraSezione()">Prova a vincere un biglietto</button>
    </header>
    <div id="count">
        <p id="giorni">-15</p>
        <p>GIORNI</p>
    </div>
    <main>
        <section id="galleria">
            <h2>Sport Olimpici</h2>
            <div id="grid-galleria">
                <div class="galleria-idem">
                    <img src="img/f1.jpg" alt="">
                </div>
                <div class="galleria-idem">
                    <img src="img/f2.jpg" alt="">
                </div>
                <div class="galleria-idem">
                    <img src="img/f3.jpg" alt="">
                </div>
                <div class="galleria-idem">
                    <img src="img/f4.jpg" alt="">
                </div>
                <div class="galleria-idem">
                    <img src="img/f5.jpg" alt="">
                </div>
                <div class="galleria-idem">
                    <img src="img/f6.jpg" alt="">
                </div>
            </div>
        </section>
        <section id="video">
            <video src="img/videoHome.mp4" autoplay muted loop></video>
        </section>
        <section id="quiz">
            <div id="quiz-section">
                <h2>Sfida Olimpica</h2>
                <div class="domanda">
                    <p>Quale è il simbolo ufficiale delle olimpiadi?</p>
                    <div>
                        <button id="zero" onclick="selezionaRisposta(0)">Una torcia</button>
                        <button id="uno" onclick="selezionaRisposta(1)">Cinque anelli intrecciati</button>
                        <button id="due" onclick="selezionaRisposta(2)">Una bandiera</button>
                    </div>
                </div>
                <button id="btnVerifica" onclick="VerificaRisposta()">VERIFICA</button>
                <div id="area-risultato"></div>
            </div>
        </section>
    </main>
    <footer>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2796.7827933184447!2d9.189981876733708!3d45.46408487107423!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4786c6cd1e9d1d3f%3A0xc7d1c34a9ddb2d5a!2sMilano%2C%20Italia!5e0!3m2!1sit!2sit!4v1642680000000!5m2!1sit!2sit" frameborder="0"></iframe>
        <p id="copy">&copy; 2026 Milano-Cortina</p>
    </footer>
</body>
</html>
